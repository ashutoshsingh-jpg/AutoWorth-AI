services:
  - type: web
    name: valuetrack-car-price-predictor
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: APP_NAME
        value: "ValueTrack AI"
      - key: PYTHON_VERSION
        value: "3.13.14"
    autoDeploy: true